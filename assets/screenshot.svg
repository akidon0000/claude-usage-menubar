<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560" font-family="-apple-system, SF Pro Display, Helvetica, sans-serif">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2E2E33"/>
      <stop offset="1" stop-color="#1B1B1F"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="720" height="560" fill="url(#wall)"/>

  <!-- Menu bar strip -->
  <rect x="0" y="0" width="720" height="28" fill="#0E0E12" opacity="0.8"/>
