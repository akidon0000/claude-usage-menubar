        <rect x="100" width="86" height="18" rx="9" fill="#8E5AD9" opacity="0.12"/>
        <text x="108" y="13" fill="#C9A4EF">git-commit (74)</text>
      </g>

      <!-- collapsed repo -->
      <g transform="translate(0,128)">
        <rect width="384" height="30" rx="6" fill="#FFFFFF" opacity="0.04"/>
        <text x="10" y="20" font-family="SF Mono, Menlo, monospace" fill="#FFFFFF" font-weight="500">sansan-android</text>
        <text x="340" y="20" fill="#CCCCCC" font-weight="600">312</text>
        <text x="366" y="20" fill="#777">›</text>
