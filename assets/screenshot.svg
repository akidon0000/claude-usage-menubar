  <text x="566" y="19" font-size="12" fill="#9A9A9A">100%</text>
  <text x="612" y="19" font-size="12" fill="#9A9A9A">Wi-Fi</text>
  <!-- Active bar-chart icon -->
  <g transform="translate(656,10)" fill="#D97757">
