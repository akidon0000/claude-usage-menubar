        <text x="0" y="0" font-size="12" font-weight="600" fill="#B98BEA">281</text>
        <text x="0" y="14" font-size="9" fill="#9A9A9A">Skills</text>
        <text x="70" y="0" font-size="12" font-weight="600" fill="#5FD06F">163</text>
        <text x="70" y="14" font-size="9" fill="#9A9A9A">MCP</text>
        <text x="140" y="0" font-size="12" font-weight="600" fill="#EFA862">22</text>
        <text x="140" y="14" font-size="9" fill="#9A9A9A">Agents</text>
        <text x="212" y="0" font-size="12" font-weight="600" fill="#73B6EF">21</text>
        <text x="212" y="14" font-size="9" fill="#9A9A9A">Prompts</text>
      </g>
