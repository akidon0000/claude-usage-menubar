        <text x="30" y="20" fill="#FFFFFF" font-weight="500">side-project</text>
        <text x="250" y="20" fill="#B98BEA">✦ 148</text>
        <text x="300" y="20" fill="#5FD06F">🔗 111</text>
        <text x="356" y="20" fill="#777">›</text>
