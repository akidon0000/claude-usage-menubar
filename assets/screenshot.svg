      <text x="344" y="15" font-size="14" fill="#9A9A9A">↻</text>
      <text x="372" y="15" font-size="14" fill="#9A9A9A">⊗</text>
    </g>
    <line x1="0" y1="44" x2="416" y2="44" stroke="#2C2C32" stroke-width="1"/>

